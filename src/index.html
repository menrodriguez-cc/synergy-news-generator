<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Synergy news HTML generator</title>
    <meta name="description" content="Synergy news html generator" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="menrodriguez-cc" />
  </head>
  <body>
    <main class="container">
      <section class="formulario">
        <form id="formulario" name="formulario">
          <label for="icono"
            >Icono<select id="icono" required>
              <option value="" ></option>
              <option value="dev" >Dev</option>
              <option value="cloud" >Cloud</option>
              <option value="info" >Info</option>
              <option value="movil" >Móvil</option>
              <option value="sociedad" >Sociedad</option>
              <option value="varios" >Varios</option>
            </select></label
          >
          <label for="texto_castellano">
            Texto castellano

            <textarea
              id="texto_castellano"
              name="texto_castellano"
              placeholder="Texto (ES)"
              aria-label="Texto en castellano"
              required
            ></textarea>
          </label>
          <label for="texto_euskera">
            Texto euskera
            <textarea
              id="texto_euskera"
              name="texto_euskera"
              placeholder="Texto (EU)"
              aria-label="Texto en euskera"
              required
            ></textarea>
          </label>

          <label for="link">
            Link
            <input
              type="url"
              id="link"
              name="link"
              placeholder="Link"
              required
            />
          </label>

          <!-- Button -->
          <button type="submit">Generar</button>
        </form>
      </section>
      <section class="resultado">
        <pre class="language-html"><code id="resultado-code" name="resultado-code">          
        </code></pre>
      </section>
      <section>
        <address>
          <a
            href="https://github.com/menrodriguez-cc/synergy-news-generator"
            target="_blank"
            rel="noopener"
            >Source code</a
          >.
        </address>
      </section>
    </main>
   
  </body>
</html>
